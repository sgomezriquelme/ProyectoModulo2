<!DOCTYPE html>
<html lang="es-ES">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Menú Principal</title>

    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container bg-color p-4 border shadow mt-3">

        <div class="text-dark">
            <h2 class="center">Menú Principal</h2>
        </div>

        <div class="form-group mt-4">
            <div class="row align-items-center">
                <div class="col-md-4 col-12">
                    <h4>Dinero en cuenta:</h4>
                </div>

                <div class="col-md-8 col-12">
                    <h4>$<span id="balance">0</span></h4>
                </div>
            </div>
        </div>

        <!-- Aquí aparecerá la leyenda de redirección -->
        <div id="messageContainer" class="mt-3"></div>

        <div class="row mt-3">

            <div class="col-md-3 col-12 mb-2">
                <button id="btnDepositar" class="btn btn-color btn-block">
                    Depositar
                </button>
            </div>

            <div class="col-md-3 col-12 mb-2">
                <button id="btnEnviarDinero" class="btn btn-color btn-block">
                    Enviar Dinero
                </button>
            </div>

            <div class="col-md-3 col-12 mb-2">
                <button id="btnUltimosMovimientos" class="btn btn-color btn-block">
                    Últimos Movimientos
                </button>
            </div>

            <div class="col-md-3 col-12 mb-2">
                <button id="btnCerrarSesion" class="btn btn-color btn-block">
                    Cerrar Sesión
                </button>
            </div>

        </div>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Popper necesario para Bootstrap 4 -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

    <!-- Bootstrap 4 JS -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

    <!-- JavaScript propio -->
    <script src="script.js"></script>

</body>

</html>

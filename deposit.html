<!DOCTYPE html>
<html lang="es-ES">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Depositar</title>

    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container bg-color p-4 border shadow mt-3">

        <div class="text-dark">
            <h2 class="center">Depositar</h2>
        </div>

        <div class="form-group mt-4">
            <div class="row align-items-center">
                <div class="col-md-4 col-12">
                    <h5>Saldo actual:</h5>
                </div>

                <div class="col-md-8 col-12">
                    <h5>$<span id="saldoActual">0</span></h5>
                </div>
            </div>
        </div>

         <!-- Alertas -->
        <div id="alert-container" class="mt-3"></div>

        <form id="depositForm">

            <div class="row align-items-center mb-3">
                <div class="col-md-3 col-12 mb-2 mb-md-0">
                    <label for="depositAmount" class="mb-0 label-form">
                        Monto a depositar
                    </label>
                </div>

                <div class="col-md-9 col-12">
                    <input
                        type="number"
                        class="form-control"
                        id="depositAmount"
                        placeholder="Ingrese el monto a depositar"
                        min="1">
                </div>
            </div>

            <div id="deposit-message" class="mb-3"></div>

            <div class="row">
                <div class="col-md-6 col-12 mb-2">
                    <button type="submit" class="btn btn-color btn-block">
                        Realizar Depósito
                    </button>
                </div>

                <div class="col-md-6 col-12 mb-2">
                    <button type="button" id="btnVolverMenuDeposito" class="btn btn-color btn-block">
                        Volver al Menú Principal
                    </button>
                </div>
            </div>

        </form>

    </div>
    
    <!-- Modal de depósito exitoso -->
    <div class="modal fade" id="modalDepositoExitoso" tabindex="-1" role="dialog" aria-labelledby="modalDepositoTitulo" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content modal-deposito">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalDepositoTitulo">Depósito realizado con éxito</h5>
                </div>

                <div class="modal-body text-center">
                    <p id="mensajeMontoDepositado" class="mb-2"></p>
                    <small>Redirigiendo al menú principal...</small>
                </div>

            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Popper necesario para Bootstrap 4 -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

    <!-- Bootstrap 4 JS -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

    <!-- JavaScript propio -->
    <script src="script.js"></script>

</body>

</html>
